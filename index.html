<script type='text/javascript' src='index.js'></script>
<script type='text/javascript'>
	const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":205270016,"index.wasm":26156492},"focusCanvas":true,"gdnativeLibs":[]};
	var engine = new Engine(GODOT_CONFIG);

	(function() {
		const INDETERMINATE_STATUS_STEP_MS = 100;
		var statusProgress = document.getElementById('status-progress');
		var statusProgressInner = document.getElementById('status-progress-inner');
		var statusIndeterminate = document.getElementById('status-indeterminate');
		var statusNotice = document.getElementById('status-notice');
		var initializing = true;
		var statusMode = 'hidden';
		var animationCallbacks = [];

		function animate(time) {
			animationCallbacks.forEach(callback => callback(time));
			requestAnimationFrame(animate);
		}
		requestAnimationFrame(animate);

		function setStatusMode(mode) {
			if (statusMode === mode || !initializing) return;
			[statusProgress, statusIndeterminate, statusNotice].forEach(elem => { elem.style.display = 'none'; });
			animationCallbacks = animationCallbacks.filter(value => value != animateStatusIndeterminate);
			switch (mode) {
				case 'progress':
					statusProgress.style.display = 'block';
					break;
				case 'indeterminate':
					statusIndeterminate.style.display = 'block';
					animationCallbacks.push(animateStatusIndeterminate);
					break;
				case 'notice':
					statusNotice.style.display = 'block';
					break;
				case 'hidden':
					break;
				default:
					throw new Error('Invalid status mode');
			}
			statusMode = mode;
		}

		function animateStatusIndeterminate(ms) {
			var i = Math.floor(ms / INDETERMINATE_STATUS_STEP_MS % 8);
			if (statusIndeterminate.children[i].style.borderTopColor == '') {
				Array.prototype.slice.call(statusIndeterminate.children).forEach(child => { child.style.borderTopColor = ''; });
				statusIndeterminate.children[i].style.borderTopColor = '#dfdfdf';
			}
		}

		function setStatusNotice(text) {
			while (statusNotice.lastChild) { statusNotice.removeChild(statusNotice.lastChild); }
			var lines = text.split('\n');
			lines.forEach((line) => {
				statusNotice.appendChild(document.createTextNode(line));
				statusNotice.appendChild(document.createElement('br'));
			});
		};

		function displayFailureNotice(err) {
			var msg = err.message || err;
			console.error(msg);
			setStatusNotice(msg);
			setStatusMode('notice');
			initializing = false;
		};

		async function fetchAndMerge(filename, partsCount, isPadded) {
			const parts = [];
			for (let i = 1; i <= partsCount; i++) {
				const suffix = isPadded ? i.toString().padStart(2, '0') : i;
				const response = await fetch(`${filename}.part${suffix}`);
				if (!response.ok) throw new Error(`Failed to fetch ${filename} part ${suffix}`);
				parts.push(await response.arrayBuffer());
			}
			return URL.createObjectURL(new Blob(parts));
		}

		if (!Engine.isWebGLAvailable()) {
			displayFailureNotice('WebGL not available');
		} else {
			setStatusMode('indeterminate');
			
			(async () => {
				try {
					const [mergedPck, mergedWasm] = await Promise.all([
						fetchAndMerge("index.pck", 11, true),
						fetchAndMerge("index.wasm", 2, false)
					]);

					engine.startGame({
						'executable': mergedWasm,
						'mainPack': mergedPck,
						'onProgress': function (current, total) {
							if (total > 0) {
								statusProgressInner.style.width = current/total * 100 + '%';
								setStatusMode('progress');
								if (current === total) {
									setTimeout(() => { setStatusMode('indeterminate'); }, 500);
								}
							} else {
								setStatusMode('indeterminate');
							}
						},
					}).then(() => {
						setStatusMode('hidden');
						initializing = false;
					}, displayFailureNotice);
				} catch (e) {
					displayFailureNotice(e);
				}
			})();
		}
	})();
</script>
